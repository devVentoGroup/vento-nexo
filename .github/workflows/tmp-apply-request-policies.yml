name: Temporary request policies integration

on:
  pull_request:
    branches:
      - preview
    paths:
      - scripts/.tmp-trigger-request-policies

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout preview
        uses: actions/checkout@v4
        with:
          ref: preview
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Decode integration script
        run: |
          base64 --decode scripts/.tmp-apply-request-policies.mjs.gz.b64 | gzip --decompress > /tmp/apply-request-policies.mjs
          python3 - <<'PY'
          from pathlib import Path
          path = Path('/tmp/apply-request-policies.mjs')
          source = path.read_text()
          helper_anchor = '''function replaceOnce(rel, before, after, label) {
            const source = read(rel);
            const count = source.split(before).length - 1;
            if (count !== 1) {
              throw new Error(`${rel}: expected exactly one match for ${label}, found ${count}`);
            }
            write(rel, source.replace(before, after));
          }
          '''
          helper = '''
          function replaceFirst(rel, before, after, label) {
            const source = read(rel);
            if (!source.includes(before)) {
              throw new Error(`${rel}: expected at least one match for ${label}`);
            }
            write(rel, source.replace(before, after));
          }
          '''
          source = source.replace(helper_anchor, helper_anchor + helper, 1)

          label = "  'items normalized profile id',\n);"
          label_position = source.index(label)
          call_position = source.rfind('replaceOnce(', 0, label_position)
          source = source[:call_position] + 'replaceFirst(' + source[call_position + len('replaceOnce('):]

          table_label = "  'table policy label',\n);"
          table_label_position = source.index(table_label)
          table_call_position = source.rfind('replaceOnce(', 0, table_label_position)
          table_call_end = source.index('\n);', table_label_position) + 3
          anchored_replacement = r'''{
            const rel = 'src/components/vento/remissions-items.tsx';
            const current = read(rel);
            const tableSection = current.indexOf('group.products.map((product) => {');
            const start = current.indexOf('const productProfile =', tableSection);
            const end = current.indexOf('const hasQuantity = Boolean(row?.quantity);', start);
            if (tableSection < 0 || start < 0 || end < 0) {
              throw new Error(`${rel}: no se encontró el bloque visual de unidad`);
            }
            const lineStart = current.lastIndexOf('\n', start) + 1;
            const indent = current.slice(lineStart, start);
            const lines = [
              `${indent}const productProfile =`,
              `${indent}  defaultProfileByProduct.get(product.id) ?? null;`,
              `${indent}const requestPolicy =`,
              `${indent}  defaultRequestPolicyByProduct.get(product.id) ?? null;`,
              `${indent}const stockUnitCode = getStockUnitCode(product);`,
              `${indent}const productUsesPackages =`,
              `${indent}  !requestPolicy &&`,
              `${indent}  usesProductionPackageDispatch(`,
              `${indent}    product,`,
              `${indent}    productProfile,`,
              `${indent}    stockUnitCode,`,
              `${indent}  );`,
              `${indent}const unitLabel = requestPolicy`,
              `${indent}  ? getRequestPolicyDisplayLabel(requestPolicy)`,
              `${indent}  : productUsesPackages`,
              `${indent}    ? stockUnitCode`,
              `${indent}    : getRemissionPresentationLabel(`,
              `${indent}        productProfile,`,
              `${indent}        stockUnitCode,`,
              `${indent}      );`,
            ];
            write(rel, current.slice(0, lineStart) + `${lines.join('\n')}\n` + current.slice(end));
          }'''
          source = source[:table_call_position] + anchored_replacement + source[table_call_end:]
          path.write_text(source)
          PY
          node --check /tmp/apply-request-policies.mjs

      - name: Apply integration
        id: apply
        continue-on-error: true
        run: node /tmp/apply-request-policies.mjs > /tmp/apply-request-policies.log 2>&1

      - name: Upload application diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: request-policy-application-log
          path: /tmp/apply-request-policies.log

      - name: Stop after application failure
        if: steps.apply.outcome == 'failure'
        run: |
          cat /tmp/apply-request-policies.log
          exit 1

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Commit validated changes
        run: |
          git config user.name "OpenAI"
          git config user.email "openai@users.noreply.github.com"
          git add src/app/inventory/remissions/page.tsx src/app/inventory/remissions/actions.ts src/components/vento/remissions-create-form.tsx src/components/vento/remissions-items.tsx src/lib/inventory/request-policy.ts
          git commit -m "Use request policies in remission modal"
          git push origin preview
