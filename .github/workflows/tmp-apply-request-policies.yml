name: Temporary request policies integration

on:
  pull_request:
    branches:
      - preview
    paths:
      - scripts/.tmp-trigger-request-policies

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout preview
        uses: actions/checkout@v4
        with:
          ref: preview
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Decode integration script
        run: |
          base64 --decode scripts/.tmp-apply-request-policies.mjs.gz.b64 | gzip --decompress > /tmp/apply-request-policies.mjs
          python3 - <<'PY'
          from pathlib import Path
          path = Path('/tmp/apply-request-policies.mjs')
          source = path.read_text()
          helper_anchor = '''function replaceOnce(rel, before, after, label) {
            const source = read(rel);
            const count = source.split(before).length - 1;
            if (count !== 1) {
              throw new Error(`${rel}: expected exactly one match for ${label}, found ${count}`);
            }
            write(rel, source.replace(before, after));
          }
          '''
          helper = '''
          function replaceFirst(rel, before, after, label) {
            const source = read(rel);
            if (!source.includes(before)) {
              throw new Error(`${rel}: expected at least one match for ${label}`);
            }
            write(rel, source.replace(before, after));
          }
          '''
          source = source.replace(helper_anchor, helper_anchor + helper, 1)

          def replace_call(label, replacement):
              global source
              marker = f"  '{label}',\n);"
              marker_position = source.index(marker)
              call_position = source.rfind('replaceOnce(', 0, marker_position)
              call_end = source.index('\n);', marker_position) + 3
              source = source[:call_position] + replacement + source[call_end:]

          label = "  'items normalized profile id',\n);"
          label_position = source.index(label)
          call_position = source.rfind('replaceOnce(', 0, label_position)
          source = source[:call_position] + 'replaceFirst(' + source[call_position + len('replaceOnce('):]

          replace_call('table policy label', r'''{
            const rel = 'src/components/vento/remissions-items.tsx';
            const current = read(rel);
            const tableSection = current.indexOf('group.products.map((product) => {');
            const start = current.indexOf('const productProfile =', tableSection);
            const end = current.indexOf('const hasQuantity = Boolean(row?.quantity);', start);
            if (tableSection < 0 || start < 0 || end < 0) {
              throw new Error(`${rel}: no se encontró el bloque visual de unidad`);
            }
            const lineStart = current.lastIndexOf('\n', start) + 1;
            const indent = current.slice(lineStart, start);
            const lines = [
              `${indent}const productProfile =`,
              `${indent}  defaultProfileByProduct.get(product.id) ?? null;`,
              `${indent}const requestPolicy =`,
              `${indent}  defaultRequestPolicyByProduct.get(product.id) ?? null;`,
              `${indent}const stockUnitCode = getStockUnitCode(product);`,
              `${indent}const productUsesPackages =`,
              `${indent}  !requestPolicy &&`,
              `${indent}  usesProductionPackageDispatch(`,
              `${indent}    product,`,
              `${indent}    productProfile,`,
              `${indent}    stockUnitCode,`,
              `${indent}  );`,
              `${indent}const unitLabel = requestPolicy`,
              `${indent}  ? getRequestPolicyDisplayLabel(requestPolicy)`,
              `${indent}  : productUsesPackages`,
              `${indent}    ? stockUnitCode`,
              `${indent}    : getRemissionPresentationLabel(`,
              `${indent}        productProfile,`,
              `${indent}        stockUnitCode,`,
              `${indent}      );`,
            ];
            write(rel, current.slice(0, lineStart) + `${lines.join('\n')}\n` + current.slice(end));
          }''')

          replace_call('table policy constraints', r'''{
            const rel = 'src/components/vento/remissions-items.tsx';
            const current = read(rel);
            const tableSection = current.indexOf('group.products.map((product) => {');
            const inputStart = current.indexOf('type="number"', tableSection);
            const minStart = current.indexOf('min="0"', inputStart);
            const valueStart = current.indexOf('value={row?.quantity ?? ""}', minStart);
            if (tableSection < 0 || inputStart < 0 || minStart < 0 || valueStart < 0) {
              throw new Error(`${rel}: no se encontró el campo de requisición de la tabla`);
            }
            const lineStart = current.lastIndexOf('\n', minStart) + 1;
            const indent = current.slice(lineStart, minStart);
            const lines = [
              `${indent}min={getRequestPolicyHtmlMin(requestPolicy)}`,
              `${indent}step={getRequestPolicyHtmlStep(requestPolicy)}`,
              `${indent}disabled={!requestPolicy}`,
            ];
            write(rel, current.slice(0, lineStart) + `${lines.join('\n')}\n` + current.slice(valueStart));
          }''')

          replace_call('cards next policy', r'''{
            const rel = 'src/components/vento/remissions-items.tsx';
            const current = read(rel);
            const cardSection = current.indexOf('onValueChange={(nextProductId) => {');
            const start = current.indexOf('const nextProfile =', cardSection);
            const end = current.indexOf('setRows((prev) =>', start);
            if (cardSection < 0 || start < 0 || end < 0) {
              throw new Error(`${rel}: no se encontró la selección de producto en tarjetas`);
            }
            const lineStart = current.lastIndexOf('\n', start) + 1;
            const indent = current.slice(lineStart, start);
            const lines = [
              `${indent}const nextProfile =`,
              `${indent}  defaultProfileByProduct.get(nextProductId) ?? null;`,
              `${indent}const nextRequestPolicy =`,
              `${indent}  defaultRequestPolicyByProduct.get(nextProductId) ?? null;`,
              `${indent}const nextUsesPackages =`,
              `${indent}  !nextRequestPolicy &&`,
              `${indent}  usesProductionPackageDispatch(`,
              `${indent}    nextProduct,`,
              `${indent}    nextProfile,`,
              `${indent}    nextStockUnitCode,`,
              `${indent}  );`,
              `${indent}const nextUsesFixedPresentation =`,
              `${indent}  !nextRequestPolicy &&`,
              `${indent}  (usesFixedPresentation(nextProduct) ||`,
              `${indent}    isTemporaryOperationUnitProfile(`,
              `${indent}      nextProfile,`,
              `${indent}      nextStockUnitCode,`,
              `${indent}    ));`,
            ];
            write(rel, current.slice(0, lineStart) + `${lines.join('\n')}\n` + current.slice(end));
          }''')

          replace_call('cards next policy values', r'''{
            const rel = 'src/components/vento/remissions-items.tsx';
            const current = read(rel);
            const cardSection = current.indexOf('onValueChange={(nextProductId) => {');
            const start = current.indexOf('inputUnitCode: nextUsesPackages', cardSection);
            const end = current.indexOf('acceptPackageFraction: false,', start);
            if (cardSection < 0 || start < 0 || end < 0) {
              throw new Error(`${rel}: no se encontraron los valores de unidad en tarjetas`);
            }
            const lineStart = current.lastIndexOf('\n', start) + 1;
            const indent = current.slice(lineStart, start);
            const lines = [
              `${indent}inputUnitCode: nextRequestPolicy`,
              `${indent}  ? getRequestPolicyInputUnitCode(nextRequestPolicy)`,
              `${indent}  : nextUsesPackages`,
              `${indent}    ? nextStockUnitCode || "un"`,
              `${indent}    : nextUsesFixedPresentation`,
              `${indent}      ? getRemissionInputUnitCode(`,
              `${indent}          nextProfile,`,
              `${indent}          nextStockUnitCode,`,
              `${indent}        )`,
              `${indent}      : nextStockUnitCode || "un",`,
              `${indent}inputUomProfileId: nextRequestPolicy`,
              `${indent}  ? (nextRequestPolicy.physicalUomProfileId ?? "")`,
              `${indent}  : nextUsesFixedPresentation`,
              `${indent}    ? (nextProfile?.id ?? "")`,
              `${indent}    : "",`,
            ];
            write(rel, current.slice(0, lineStart) + `${lines.join('\n')}\n` + current.slice(end));
          }''')

          replace_call('cards policy constraints', r'''{
            const rel = 'src/components/vento/remissions-items.tsx';
            const current = read(rel);
            const cardSection = current.indexOf('{entryMode === "cards"');
            const inputStart = current.indexOf('type="number"', cardSection);
            const minStart = current.indexOf('min="0"', inputStart);
            const nameStart = current.indexOf('name="item_quantity"', minStart);
            if (cardSection < 0 || inputStart < 0 || minStart < 0 || nameStart < 0) {
              throw new Error(`${rel}: no se encontró el campo de cantidad en tarjetas`);
            }
            const lineStart = current.lastIndexOf('\n', minStart) + 1;
            const indent = current.slice(lineStart, minStart);
            const lines = [
              `${indent}min={getRequestPolicyHtmlMin(requestPolicy)}`,
              `${indent}step={getRequestPolicyHtmlStep(requestPolicy)}`,
              `${indent}disabled={Boolean(row.productId && !requestPolicy)}`,
            ];
            write(rel, current.slice(0, lineStart) + `${lines.join('\n')}\n` + current.slice(nameStart));
          }''')

          path.write_text(source)
          PY
          node --check /tmp/apply-request-policies.mjs

      - name: Apply integration
        id: apply
        continue-on-error: true
        run: node /tmp/apply-request-policies.mjs > /tmp/apply-request-policies.log 2>&1

      - name: Upload application diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: request-policy-application-log
          path: /tmp/apply-request-policies.log

      - name: Stop after application failure
        if: steps.apply.outcome == 'failure'
        run: |
          cat /tmp/apply-request-policies.log
          exit 1

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Commit validated changes
        run: |
          git config user.name "OpenAI"
          git config user.email "openai@users.noreply.github.com"
          git add src/app/inventory/remissions/page.tsx src/app/inventory/remissions/actions.ts src/components/vento/remissions-create-form.tsx src/components/vento/remissions-items.tsx src/lib/inventory/request-policy.ts
          git commit -m "Use request policies in remission modal"
          git push origin preview
