name: Temporary request policies integration

on:
  pull_request:
    branches:
      - preview
    paths:
      - scripts/.tmp-trigger-request-policies

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout preview
        uses: actions/checkout@v4
        with:
          ref: preview
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Decode integration script
        run: |
          base64 --decode scripts/.tmp-apply-request-policies.mjs.gz.b64 | gzip --decompress > /tmp/apply-request-policies.mjs
          python3 - <<'PY'
          from pathlib import Path
          path = Path('/tmp/apply-request-policies.mjs')
          source = path.read_text()
          helper_anchor = '''function replaceOnce(rel, before, after, label) {
            const source = read(rel);
            const count = source.split(before).length - 1;
            if (count !== 1) {
              throw new Error(`${rel}: expected exactly one match for ${label}, found ${count}`);
            }
            write(rel, source.replace(before, after));
          }
          '''
          helper = '''
          function replaceFirst(rel, before, after, label) {
            const source = read(rel);
            if (!source.includes(before)) {
              throw new Error(`${rel}: expected at least one match for ${label}`);
            }
            write(rel, source.replace(before, after));
          }
          '''
          source = source.replace(helper_anchor, helper_anchor + helper, 1)
          label = "  'items normalized profile id',\n);"
          label_position = source.index(label)
          call_position = source.rfind('replaceOnce(', 0, label_position)
          source = source[:call_position] + 'replaceFirst(' + source[call_position + len('replaceOnce('):]
          path.write_text(source)
          PY
          node --check /tmp/apply-request-policies.mjs

      - name: Apply integration
        id: apply
        continue-on-error: true
        run: node /tmp/apply-request-policies.mjs > /tmp/apply-request-policies.log 2>&1

      - name: Upload application diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: request-policy-application-log
          path: /tmp/apply-request-policies.log

      - name: Stop after application failure
        if: steps.apply.outcome == 'failure'
        run: |
          cat /tmp/apply-request-policies.log
          exit 1

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Commit validated changes
        run: |
          git config user.name "OpenAI"
          git config user.email "openai@users.noreply.github.com"
          git add src/app/inventory/remissions/page.tsx src/app/inventory/remissions/actions.ts src/components/vento/remissions-create-form.tsx src/components/vento/remissions-items.tsx src/lib/inventory/request-policy.ts
          git commit -m "Use request policies in remission modal"
          git push origin preview
