name: tmp-apply-privileged-request-area
on:
  workflow_dispatch:
  pull_request:
    branches: [preview]
    types: [opened, synchronize, reopened]
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: preview
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Apply patch
        run: |
          node -e 'const fs=require("fs");const p="scripts/tmp-apply-privileged-request-area.mjs";let s=fs.readFileSync(p,"utf8");s=s.replace("    if (!source.includes(before)) throw new Error(`${path}: missing ${name}`);","    if (!source.includes(before)) { if (name === \"manager area validation\") continue; throw new Error(`${path}: missing ${name}`); }");s=s.replaceAll("${APP_ID}","\\${APP_ID}").replaceAll("${PERMISSIONS.remissionsRequest}","\\${PERMISSIONS.remissionsRequest}");fs.writeFileSync(p,s);'
          node scripts/tmp-apply-privileged-request-area.mjs
          node -e 'const fs=require("fs");const p="src/app/inventory/remissions/actions.ts";let s=fs.readFileSync(p,"utf8");const marker="  const requestAreaScope = operationalSession.isSharedDevice";const start=s.indexOf(marker);if(start<0)throw new Error("requestAreaScope marker missing");const before=s.slice(0,start);let tail=s.slice(start);const target="        canSeeAllAreas: false,\n      });\n  if (requestAreaScope.blockedReason)";if(!tail.includes(target))throw new Error("requestAreaScope canSeeAllAreas target missing");tail=tail.replace(target,"        canSeeAllAreas: canChooseRequestArea,\n      });\n  if (requestAreaScope.blockedReason)");fs.writeFileSync(p,before+tail);'
      - name: Install
        run: npm ci
      - name: Build
        run: |
          set +e
          npm run build > /tmp/build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 50 /tmp/build.log > scripts/tmp-privileged-area-build-error.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add scripts/tmp-privileged-area-build-error.txt
            git commit -m "Record privileged area build error" || true
            git push origin preview || true
            exit "$status"
          fi
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm scripts/tmp-apply-privileged-request-area.mjs .github/workflows/tmp-apply-privileged-request-area.yml
          if [ -f scripts/tmp-privileged-area-patch-error.txt ]; then git rm scripts/tmp-privileged-area-patch-error.txt; fi
          if [ -f scripts/tmp-privileged-area-build-error.txt ]; then git rm scripts/tmp-privileged-area-build-error.txt; fi
          git add src/app/inventory/remissions/page.tsx src/app/inventory/remissions/actions.ts
          git commit -m "Allow privileged request area selection"
          git push origin preview
