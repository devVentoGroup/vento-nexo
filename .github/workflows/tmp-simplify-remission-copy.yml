name: tmp-simplify-remission-copy

on:
  pull_request:
    branches:
      - preview

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/request-policy-model-preview
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Simplify operational copy
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/components/vento/remissions-create-form.tsx')
          text = path.read_text(encoding='utf-8')

          replacements = {
              '''                      <div className="mt-1 text-xs font-semibold text-slate-700">
                        Modo: {item.measurementModeLabel}
                      </div>
''': '',
              'Equivalencia inventario: {item.conversionSummary}': 'Equivalencia: {item.conversionSummary}',
              '''                      ) : !item.requiresPresentationProfile ? (
                        <div className="mt-2 text-xs font-semibold text-emerald-800">
                          Se solicitará por cantidad real; no requiere presentación fija.
                        </div>
                      ) : null}
''': '''                      ) : null}
''',
              'Esta remisión funciona como solicitud operativa. No valida disponibilidad ni afecta inventario real.': 'Inventario desactivado.',
          }

          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'Expected text not found: {old[:80]!r}')
              text = text.replace(old, new, 1)

          path.write_text(text, encoding='utf-8')
          PY
      - name: Remove temporary workflow
        run: rm .github/workflows/tmp-simplify-remission-copy.yml
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
      - name: Commit
        run: |
          git config user.name "vento-preview-bot"
          git config user.email "preview-bot@ventogroup.co"
          git add src/components/vento/remissions-create-form.tsx .github/workflows/tmp-simplify-remission-copy.yml
          git commit -m "Simplify remission operational copy"
          git push origin HEAD:agent/request-policy-model-preview
